# Levanzo — Streamlit Theme (Light / Day)
# Drop this file into your project at .streamlit/config.toml
# Based on the Levanzo design system: https://github.com/thejohnnyxu/levanzo-ui

[theme]

# ── Base ──────────────────────────────────────────────────────
base = "light"

# ── Backgrounds ───────────────────────────────────────────────
backgroundColor          = "#D8D2C8"   # warm stone — matches VSCode chrome floor
secondaryBackgroundColor = "#C8C2B6"   # deeper stone — sidebar, expanders, code blocks

# ── Text ──────────────────────────────────────────────────────
textColor                = "#1E1410"   # deep espresso — maximum contrast

# ── Primary accent (buttons, sliders, checkboxes, progress) ───
primaryColor             = "#A85C38"   # --terracotta

# ── Font ──────────────────────────────────────────────────────
font = "sans serif"
